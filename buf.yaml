version: v2
modules:
  - path: proto
    name: buf.build/ctc-oss/omega-edit
deps:
  - buf.build/googleapis/googleapis
lint:
  use:
    # BASIC covers correctness (naming, imports, enums, packages).
    # STANDARD is not used because DIRECTORY_SAME_PACKAGE cannot be suppressed
    # and the existing proto layout (proto/omega_edit.proto) doesn't match the
    # directory-equals-package convention that STANDARD enforces.
    - BASIC
    - IMPORT_USED
    - FIELD_NOT_REQUIRED
breaking:
  use:
    - FILE
