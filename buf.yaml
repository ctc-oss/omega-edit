version: v2
modules:
  - path: proto
    name: buf.build/ctc-oss/omega-edit
deps:
  - buf.build/googleapis/googleapis
lint:
  use:
    # Individual rules from BASIC, excluding DIRECTORY_SAME_PACKAGE which
    # cannot be suppressed via except in buf v2 and conflicts with the
    # existing proto/ layout (package is omega_edit but directory is not).
    - PACKAGE_DEFINED
    - PACKAGE_SAME_DIRECTORY
    - ENUM_FIRST_VALUE_ZERO
    - ENUM_NO_ALLOW_ALIAS
    - FIELD_NO_DUPLICATE_JSON_NAME
    - IMPORT_NO_PUBLIC
    - IMPORT_NO_WEAK
    - PACKAGE_NO_IMPORT_CYCLE
    - IMPORT_USED
    - FIELD_NOT_REQUIRED
breaking:
  use:
    - FILE
