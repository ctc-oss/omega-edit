---
name: Deploy Documentation
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-docs:
    runs-on: macos-15
    steps:
      - name: Install Prerequisites 📚
        run: |
          brew install ninja doxygen graphviz
      - name: Checkout Source 🛎️
        uses: actions/checkout@v6
      - name: Setup Python 🐍
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Create Virtual Environment 🌐
        run: |
          python -m venv venv
      - name: Install Python Dependencies 📦
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install breathe sphinx_rtd_theme sphinx-rtd-dark-mode sphinx-sitemap sphinx
      - name: Prepare and Build Documentation 🔧
        run: |
          source venv/bin/activate
          cmake --preset ci-docs
          cmake --build --preset ci-docs --target sphinx --config Release
          touch build/core/docs/sphinx/.nojekyll
      - name: Setup Node.js 📦
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Generate TypeDoc API Reference 📖
        run: |
          yarn install --frozen-lockfile
          npx tsc -p packages/server/tsconfig.json --skipLibCheck
          cd packages/client
          yarn compile-src
          yarn build
          npx typedoc --skipErrorChecking
      - name: Merge Documentation 📂
        run: |
          cp -r packages/client/doc build/core/docs/sphinx/ts-api
      - name: Deploy User Documentation 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build/core/docs/sphinx # The deployment folder should match the name of the artifact.
