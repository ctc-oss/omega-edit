---
name: Build Native
description: Reusable action for building native code
inputs:
  runner-os:
    description: 'OS Name of Runner (macOS, Linux, Windows)'
    required: true
  os-name:
    description: 'OS Name (runs-on value)'
    required: true
runs:
  using: "composite"
  steps:
    - name: Enable Developer Command Prompt
      if: inputs.runner-os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup cmake
      uses: lukka/get-cmake@latest

    - name: Setup Python for plugin dependencies
      if: inputs.runner-os == 'Windows'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Conan for plugin dependencies
      if: inputs.runner-os == 'Windows'
      shell: bash
      run: pip install conan

    - name: Detect Conan profile for plugin dependencies
      if: inputs.runner-os == 'Windows'
      shell: bash
      run: conan profile detect --force

    - name: Configure Conan for Visual Studio 18
      if: inputs.runner-os == 'Windows' && startsWith(inputs.os-name, 'windows-2025')
      shell: bash
      run: echo "CONAN_MSBUILD_VS_CONF=-c tools.microsoft.msbuild:vs_version=18" >> "$GITHUB_ENV"

    - name: Cache transform plugin Conan packages
      if: inputs.runner-os == 'Windows'
      uses: actions/cache@v4
      with:
        path: ~/.conan2
        key: plugin-conan-${{ inputs.os-name }}-${{ hashFiles('plugins/conanfile.py') }}
        restore-keys: |
          plugin-conan-${{ inputs.os-name }}-

    - name: Install transform plugin dependencies via Conan
      if: inputs.runner-os == 'Windows'
      shell: bash
      run: |
        conan install plugins --output-folder=build/plugin-conan \
          --build=missing \
          -s build_type=Release \
          ${CONAN_MSBUILD_VS_CONF:-} \
          -c tools.cmake.cmaketoolchain:generator=Ninja

    - name: Install transform plugin system dependencies
      if: inputs.runner-os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y zlib1g-dev

    - name: Set install path
      shell: bash
      run: |
          mkdir -p _install
          echo "install_path=$(pwd)/_install" >> $GITHUB_ENV
          echo "install_rel_path=_install" >> $GITHUB_ENV

    - name: Prepare, Build, Test, and Install Omega Edit native library
      shell: bash
      run: |
        cmake_args=()
        if [ "${{ inputs.runner-os }}" == "Windows" ]; then
          cmake_args+=("-DCMAKE_TOOLCHAIN_FILE=$(pwd)/build/plugin-conan/conan_toolchain.cmake")
        fi
        if [ "${{ inputs.runner-os }}" == "macOS" ]; then
          cmake --preset ci -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" "${cmake_args[@]}"
        else
          cmake --preset ci "${cmake_args[@]}"
        fi
        cmake --build --preset ci --config Release
        ctest -C Release --test-dir build/core --output-on-failure
        ctest -C Release --test-dir build/plugins --output-on-failure
        cmake --install build/packages/core --prefix "${{ env.install_path }}" --config Release

    - name: Find Library For ${{ inputs.runner-os }}
      shell: bash
      run: |
        if [ "${{ inputs.runner-os }}" == "Windows" ]; then
          libname=omega_edit.dll
        elif [ "${{ inputs.runner-os }}" == "macOS" ]; then
          libname=libomega_edit.dylib
        else
          libname=libomega_edit.so
        fi
        libpath=$(find -L "${{ env.install_rel_path }}" -type f -name "${libname}" | head -n 1)
        if ! [ -s "${libpath}" ]; then
          echo "ERROR: Library ${libname} not found in ${{ env.install_rel_path }}" >&2
          find -L "${{ env.install_rel_path }}" -type f
          exit 1
        fi

        if [ "${{ inputs.runner-os }}" == "macOS" ]; then
          slice_arch=""
          if echo "${{ inputs.os-name }}" | grep -q -- "-x64"; then
            slice_arch="x86_64"
          elif echo "${{ inputs.os-name }}" | grep -q -- "-arm64"; then
            slice_arch="arm64"
          fi

          if [ -n "${slice_arch}" ]; then
            echo "Extracting macOS slice ${slice_arch} from ${libpath}"
            lipo -info "${libpath}"
            thin_dir=$(mktemp -d)
            thin_path="${thin_dir}/${libname}"
            if ! lipo "${libpath}" -extract "${slice_arch}" -output "${thin_path}"; then
              echo "ERROR: failed to extract ${slice_arch} slice via lipo" >&2
              exit 1
            fi
            libpath="${thin_path}"
          fi
        fi

        ls -l "${libpath}"
        echo "libname=${libname}" >> $GITHUB_ENV
        echo "libpath=${libpath}" >> $GITHUB_ENV

    - name: Upload Native Library (${{ inputs.os-name }}-${{ env.libname }})
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.os-name }}-${{ env.libname }}
        path: ${{ env.libpath }}
        retention-days: 5
        if-no-files-found: error
