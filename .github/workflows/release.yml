---
name: Automatic Release
on:
  push:
    tags:
      - "v*.*.*"
env:
  node_version: 20
  export_cmd: |
    GIT_TAG=$(echo ${GITHUB_REF#refs/*/} | cut -d 'v' -f 2)
    PKG_VERSION=$(echo $(node -p "JSON.stringify(require('./package.json').version)") | sed 's|"||g')
    echo "GIT_TAG=$GIT_TAG" >> $GITHUB_ENV
    echo "PKG_VERSION=$PKG_VERSION" >> $GITHUB_ENV

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Count lines of code (CLOC) 📐
        id: cloc
        uses: djdefi/cloc-action@6

      - name: Check ratCheck ✅
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: rat-check
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # This check name is defined as the github action job name (in .github/workflows/testing.yaml)
          checkName: "Rat Check 🐀"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check Scala format ✅
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: scala-format
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # This check name is defined as the github action job name (in .github/workflows/testing.yaml)
          checkName: "Scala Code Format"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check TypeScript format ✅
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: ts-format
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # This check name is defined as the github action job name (in .github/workflows/testing.yaml)
          checkName: "TypeScript code is properly formatted"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check tests - macOS 15 ✅
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: macos15-tests
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # This check name is defined as the github action job name (in .github/workflows/testing.yaml)
          checkName: "Build middleware macos-15 🔧"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check tests - macOS 14 ✅
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: macos14-tests
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # This check name is defined as the github action job name (in .github/workflows/testing.yaml)
          checkName: "Build middleware macos-14 🔧"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check tests - Linux ✅
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: ubuntu-tests
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # This check name is defined as the github action job name (in .github/workflows/testing.yaml)
          checkName: "Build middleware ubuntu-22.04 🔧"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check tests - Windows ✅
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: windows-tests
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # This check name is defined as the github action job name (in .github/workflows/testing.yaml)
          checkName: "Build middleware windows-2022 🔧"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check native build arm64 - Linux ✅
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: ubuntu-arm64-native
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # This check name is defined as the github action job name (in .github/workflows/testing.yaml)
          checkName: "Native build ubuntu-22.04 arm64 🦙"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Quality Gate ✅
        if: |
          steps.rat-check.outputs.conclusion != 'success' ||
          steps.scala-format.outputs.conclusion != 'success' ||
          steps.ts-format.outputs.conclusion != 'success' ||
          steps.macos15-tests.outputs.conclusion != 'success' ||
          steps.macos14-tests.outputs.conclusion != 'success' ||
          steps.ubuntu-tests.outputs.conclusion != 'success' ||
          steps.ubuntu-arm64-native.outputs.conclusion != 'success' ||
          steps.windows-tests.outputs.conclusion != 'success'
        run: |
          echo "Rat Check Status: ${{ steps.rat-check.conclusion }}"
          echo "Scala Format Status: ${{ steps.scala-format.conclusion }}"
          echo "Typescript Format Status: ${{ steps.ts-format.conclusion }}"
          echo "MacOS 15 Test Status: ${{ steps.macos15-tests.outputs.conclusion }}"
          echo "MacOS 14 Test Status: ${{ steps.macos14-tests.outputs.conclusion }}"
          echo "Ubuntu Test Status: ${{ steps.ubuntu-tests.conclusion }}"
          echo "Ubuntu ARM64 Native Status: ${{ steps.ubuntu-arm64-native.conclusion }}"
          echo "Windows Test Status: ${{ steps.windows-tests.conclusion }}"
          false

  create-release:
    name: Create Release ✨
    needs: [quality-gate]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Export git tag and package.json version 🚢
        run: ${{ env.export_cmd }}

      - name: Check if pre-release ✅
        run: |
          if [[ ${{ env.GIT_TAG }} == *"pre-"* || ${{ env.GIT_TAG }} == *"-pre"* ]]; then
            echo "PRE_RELEASE=true" >> $GITHUB_ENV
          else
            echo "PRE_RELEASE=false" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Create release 🔧
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref }}
          draft: false
          prerelease: "${{ env.PRE_RELEASE }}"

      - name: Create upload_url file 🔧
        run: echo "${{ steps.create_release.outputs.upload_url }}" > upload_url

      - name: Upload upload_url 🔺
        uses: actions/upload-artifact@v7
        with:
          name: upload_url
          path: upload_url

  scala-publish-libs:
    needs: [create-release]
    name: Scala Publish Libraries (SPI, Native, API) ✨
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Export git tag and package.json version 🚢
        run: ${{ env.export_cmd }}
        shell: bash

      - name: Setup Java ☕
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 8
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Make _install directory to store lib files
        run: mkdir -p _install

      - name: Download linux x86 library file 🔻
        uses: dawidd6/action-download-artifact@v16
        with:
          workflow: tests.yml
          branch: main
          workflow_conclusion: success
          name: ubuntu-22.04-x64-libomega_edit.so
          path: _install/libomega_edit_linux_amd64.so

      - name: Download linux arm64 library file 🔻
        uses: dawidd6/action-download-artifact@v16
        with:
          workflow: tests.yml
          branch: main
          workflow_conclusion: success
          name: ubuntu-22.04-arm64-libomega_edit.so
          path: _install/libomega_edit_linux_aarch64.so

      - name: Download macos-15 library file 🔻
        uses: dawidd6/action-download-artifact@v16
        with:
          workflow: tests.yml
          branch: main
          workflow_conclusion: success
          name: macos-15-x64-libomega_edit.dylib
          path: _install/libomega_edit_macos_x86_64.dylib

      - name: Download macos-14 library file 🔻
        uses: dawidd6/action-download-artifact@v16
        with:
          workflow: tests.yml
          branch: main
          workflow_conclusion: success
          name: macos-14-arm64-libomega_edit.dylib
          path: _install/libomega_edit_macos_aarch64.dylib

      - name: Download windows library file 🔻
        uses: dawidd6/action-download-artifact@v16
        with:
          workflow: tests.yml
          branch: main
          workflow_conclusion: success
          name: windows-2022-x64-omega_edit.dll
          path: _install/omega_edit_windows_64.dll

      - name: Move out library files 🛻
        run: |
          for lib_filename in \
            "libomega_edit_linux_amd64.so" \
            "libomega_edit_linux_aarch64.so" \
            "libomega_edit_macos_x86_64.dylib" \
            "libomega_edit_macos_aarch64.dylib" \
            "omega_edit_windows_64.dll"
          do
            downloaded_filename=$(echo $lib_filename \
              | sed "s|_linux_amd64||g" \
              | sed "s|_linux_aarch64||g" \
              | sed "s|_macos_x86_64||g" \
              | sed "s|_macos_aarch64||g" \
              | sed "s|_windows_64||g"
            )
            mv -v "${lib_filename}" "${lib_filename}_dir"
            mv -v "${lib_filename}_dir/$downloaded_filename" "$lib_filename"
            rm -rf "${lib_filename}_dir"
          done
        working-directory: _install
        shell: bash

      ###################################
      ## Scala library publish process ##
      ###################################

      - name: Package Scala SPI 🎁
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_RELEASE: true
          OE_LIB_DIR: "../../_install"
        run: sbt spi/publish
        working-directory: server/scala

      - name: Package Scala Native 🎁
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_RELEASE: true
          OE_LIB_DIR: "../../_install"
        run: sbt native/publish
        working-directory: server/scala

      - name: Package Scala API 🎁
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_RELEASE: true
          OE_LIB_DIR: "../../_install"
        run: sbt api/publish
        working-directory: server/scala

  cpp-server-build:
    name: Build C++ Server (${{ matrix.platform }}) 🔨
    needs: [create-release]
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            runner-os: Linux
            platform: linux-x64
            binary-name: omega-edit-grpc-server
          - os: macos-14
            runner-os: macOS
            platform: macos-arm64
            binary-name: omega-edit-grpc-server
          - os: windows-2022
            runner-os: Windows
            platform: windows-x64
            binary-name: omega-edit-grpc-server.exe
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Build C++ Middleware 🔨
        uses: ./.github/workflows/build-middleware-cpp
        with:
          runner-os: ${{ matrix.runner-os }}
          os-name: ${{ matrix.os }}
          skip-tests: 'true'

      - name: Rename binary with platform suffix 🏷️
        shell: bash
        run: |
          src="${{ env.CPP_SERVER_BINARY }}"
          ext=""
          if [[ "${{ matrix.runner-os }}" == "Windows" ]]; then ext=".exe"; fi
          dest="$(dirname "$src")/omega-edit-grpc-server-${{ matrix.platform }}${ext}"
          cp "$src" "$dest"
          echo "PLATFORM_BINARY=$dest" >> $GITHUB_ENV

      - name: Upload platform binary artifact 🔺
        uses: actions/upload-artifact@v7
        with:
          name: cpp-server-${{ matrix.platform }}
          path: ${{ env.PLATFORM_BINARY }}
          retention-days: 1
          if-no-files-found: error

  node-server-release:
    name: Node Server Release (Universal) ✨
    needs: [create-release, cpp-server-build]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Export git tag and package.json version 🚢
        run: ${{ env.export_cmd }}

      - name: Download upload_url 🔻
        uses: actions/download-artifact@v8
        with:
          name: upload_url

      - name: Add upload_url to GITHUB_ENV
        run: |
          UPLOAD_URL=$(cat upload_url)
          echo "UPLOAD_URL=$UPLOAD_URL" >> $GITHUB_ENV

      - name: Setup Node 📐
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: ${{ env.node_version }}
          cache: 'yarn'

      - name: Create binaries directory 📂
        run: mkdir -p _server_binaries

      - name: Download Linux x64 binary 🔻
        uses: actions/download-artifact@v8
        with:
          name: cpp-server-linux-x64
          path: _server_binaries

      - name: Download macOS arm64 binary 🔻
        uses: actions/download-artifact@v8
        with:
          name: cpp-server-macos-arm64
          path: _server_binaries

      - name: Download Windows x64 binary 🔻
        uses: actions/download-artifact@v8
        with:
          name: cpp-server-windows-x64
          path: _server_binaries

      - name: Verify binaries 🔍
        run: ls -la _server_binaries/

      - name: Install dependencies 🏗️
        run: yarn

      - name: Build and package universal server 📦
        run: yarn workspace @omega-edit/server package-no-sbt
        env:
          CPP_SERVER_BINARIES_DIR: ${{ github.workspace }}/_server_binaries

      - name: Upload node server release tarball 🔺
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ env.UPLOAD_URL }}
          asset_path: ./packages/server/omega-edit-node-server-v${{ env.PKG_VERSION }}.tgz
          asset_name: omega-edit-node-server-v${{ env.PKG_VERSION }}.tgz
          asset_content_type: application/tar+gzip

      - name: Upload standalone binaries as release assets 🔺
        shell: bash
        run: |
          # The upload_url contains a {?name,label} suffix that must be replaced
          upload_url="${{ env.UPLOAD_URL }}"
          upload_url="${upload_url%%\{*}"
          for binary in _server_binaries/*; do
            name=$(basename "$binary")
            echo "Uploading $name..."
            curl -sSL -f \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$binary" \
              "${upload_url}?name=$(echo "$name" | jq -sRr @uri)"
          done

      - name: Publish server node package to npm registry 🚀
        run: yarn publish omega-edit-node-server-v${{ env.PKG_VERSION }}.tgz -f --access=public
        working-directory: packages/server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        if: ${{ contains(github.event.head_commit.message, '[node_publish]') || contains(github.event.head_commit.message, '[node-publish]') }}

  node-client-release:
    name: Node Client Release ✨
    needs: [create-release]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Export git tag and package.json version 🚢
        run: ${{ env.export_cmd }}

      - name: Download upload_url 🔻
        uses: actions/download-artifact@v8
        with:
          name: upload_url

      - name: Add upload_url to GITHUB_ENV 📐
        run: |
          UPLOAD_URL=$(cat upload_url)
          echo "UPLOAD_URL=$UPLOAD_URL" >> $GITHUB_ENV

      ##########################
      ## Node release process ##
      ##########################
      - name: Setup Node 📐
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: ${{ env.node_version }}
          cache: 'yarn'

      - name: Install dependencies 🏗️
        run: yarn

      - name: Build and package client 📦
        run: yarn workspace @omega-edit/client package

      - name: Upload node client release tarball 🔺
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ env.UPLOAD_URL }}
          asset_path: ./packages/client/omega-edit-node-client-v${{ env.PKG_VERSION }}.tgz
          asset_name: omega-edit-node-client-v${{ env.PKG_VERSION }}.tgz
          asset_content_type: application/tar+gzip

      - name: Publish client node package to npm registry 🚀
        run: yarn publish omega-edit-node-client-v${{ env.PKG_VERSION }}.tgz -f --access=public
        working-directory: packages/client
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        if: ${{ contains(github.event.head_commit.message, '[node_publish]') || contains(github.event.head_commit.message, '[node-publish]') }}
