---
name: Automatic Release
on:
  push:
    tags:
      - "v*.*.*"

env:
  node_version: 24
  export_cmd: |
    GIT_TAG=$(echo ${GITHUB_REF#refs/*/} | cut -d 'v' -f 2)
    PKG_VERSION=$(echo $(node -p "JSON.stringify(require('./package.json').version)") | sed 's|"||g')
    VSCODE_EXTENSION_VERSION=$(echo $(node -p "JSON.stringify(require('./examples/vscode-extension/package.json').version)") | sed 's|"||g')
    echo "GIT_TAG=$GIT_TAG" >> $GITHUB_ENV
    echo "PKG_VERSION=$PKG_VERSION" >> $GITHUB_ENV
    echo "VSCODE_EXTENSION_VERSION=$VSCODE_EXTENSION_VERSION" >> $GITHUB_ENV

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-22.04
    permissions:
      checks: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Count lines of code (CLOC)
        id: cloc
        uses: djdefi/cloc-action@6

      - name: Check ratCheck
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: rat-check
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "Rat Check"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check TypeScript format
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: ts-format
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "TypeScript code passes Biome checks"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check VS Code extension - Ubuntu 1.110.0
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: vscode-ubuntu-floor
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "VS Code extension checks on ubuntu-24.04 with VS Code 1.110.0"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check VS Code extension - Ubuntu stable
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: vscode-ubuntu-stable
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "VS Code extension checks on ubuntu-24.04 with VS Code stable"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check VS Code extension - Windows 1.110.0
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: vscode-windows-floor
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "VS Code extension checks on windows-2025 with VS Code 1.110.0"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check VS Code extension - Windows stable
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: vscode-windows-stable
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "VS Code extension checks on windows-2025 with VS Code stable"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check tests - macOS 15
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: macos15-tests
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "Build middleware macos-15"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check tests - macOS 14
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: macos14-tests
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "Build middleware macos-14"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check tests - Linux
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: ubuntu-tests
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "Build middleware ubuntu-22.04"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check tests - Windows
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: windows-tests
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "Build middleware windows-2022"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check native build arm64 - Linux
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: ubuntu-arm64-native
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "Native build ubuntu-22.04 arm64"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Quality Gate
        if: |
          steps.rat-check.outcome != 'success' ||
          steps.ts-format.outcome != 'success' ||
          steps.vscode-ubuntu-floor.outcome != 'success' ||
          steps.vscode-ubuntu-stable.outcome != 'success' ||
          steps.vscode-windows-floor.outcome != 'success' ||
          steps.vscode-windows-stable.outcome != 'success' ||
          steps.macos15-tests.outcome != 'success' ||
          steps.macos14-tests.outcome != 'success' ||
          steps.ubuntu-tests.outcome != 'success' ||
          steps.ubuntu-arm64-native.outcome != 'success' ||
          steps.windows-tests.outcome != 'success'
        run: |
          echo "Rat Check Status: ${{ steps.rat-check.outcome }}"
          echo "Typescript Format Status: ${{ steps.ts-format.outcome }}"
          echo "VS Code Ubuntu 1.110.0 Status: ${{ steps.vscode-ubuntu-floor.outcome }}"
          echo "VS Code Ubuntu stable Status: ${{ steps.vscode-ubuntu-stable.outcome }}"
          echo "VS Code Windows 1.110.0 Status: ${{ steps.vscode-windows-floor.outcome }}"
          echo "VS Code Windows stable Status: ${{ steps.vscode-windows-stable.outcome }}"
          echo "MacOS 15 Test Status: ${{ steps.macos15-tests.outcome }}"
          echo "MacOS 14 Test Status: ${{ steps.macos14-tests.outcome }}"
          echo "Ubuntu Test Status: ${{ steps.ubuntu-tests.outcome }}"
          echo "Ubuntu ARM64 Native Status: ${{ steps.ubuntu-arm64-native.outcome }}"
          echo "Windows Test Status: ${{ steps.windows-tests.outcome }}"
          false

  create-release:
    name: Create Release
    needs: [quality-gate]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Export git tag and package.json version
        run: ${{ env.export_cmd }}

      - name: Check if pre-release
        shell: bash
        run: |
          if [[ ${{ env.GIT_TAG }} == *"-alpha"* || ${{ env.GIT_TAG }} == *"-beta"* || ${{ env.GIT_TAG }} == *"-rc"* || ${{ env.GIT_TAG }} == *"pre-"* || ${{ env.GIT_TAG }} == *"-pre"* ]]; then
            echo "PRE_RELEASE=true" >> $GITHUB_ENV
          else
            echo "PRE_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Create release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref }}
          draft: false
          prerelease: "${{ env.PRE_RELEASE }}"

      - name: Create upload_url file
        run: echo "${{ steps.create_release.outputs.upload_url }}" > upload_url

      - name: Upload upload_url
        uses: actions/upload-artifact@v7
        with:
          name: upload_url
          path: upload_url

  cpp-server-build:
    name: Build C++ Server (${{ matrix.platform }})
    needs: [create-release]
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            runner-os: Linux
            platform: linux-x64
          - os: ubuntu-24.04-arm
            runner-os: Linux
            platform: linux-arm64
          - os: macos-15
            runner-os: macOS
            platform: macos-x64
          - os: macos-14
            runner-os: macOS
            platform: macos-arm64
          - os: windows-2022
            runner-os: Windows
            platform: windows-x64
      fail-fast: false
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build C++ Middleware
        uses: ./.github/workflows/build-middleware
        with:
          runner-os: ${{ matrix.runner-os }}
          os-name: ${{ matrix.os }}
          skip-tests: 'true'

      - name: Rename binary with platform suffix
        shell: bash
        run: |
          src="${{ env.CPP_SERVER_BINARY }}"
          ext=""
          if [[ "${{ matrix.runner-os }}" == "Windows" ]]; then ext=".exe"; fi
          dest="server/cpp/build/omega-edit-grpc-server-${{ matrix.platform }}${ext}"
          cp "$src" "$dest"
          echo "PLATFORM_BINARY=$dest" >> $GITHUB_ENV

      - name: Upload platform binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: cpp-server-${{ matrix.platform }}
          path: ${{ env.PLATFORM_BINARY }}
          retention-days: 1
          if-no-files-found: error

  node-server-release:
    name: Node Server Release (Universal)
    needs: [create-release, cpp-server-build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Export git tag and package.json version
        run: ${{ env.export_cmd }}

      - name: Download upload_url
        uses: actions/download-artifact@v8
        with:
          name: upload_url

      - name: Add upload_url to GITHUB_ENV
        run: |
          UPLOAD_URL=$(cat upload_url)
          echo "UPLOAD_URL=$UPLOAD_URL" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: ${{ env.node_version }}
          cache: 'yarn'

      - name: Create binaries directory
        run: mkdir -p _server_binaries

      - name: Download Linux x64 binary
        uses: actions/download-artifact@v8
        with:
          name: cpp-server-linux-x64
          path: _server_binaries

      - name: Download macOS arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: cpp-server-macos-arm64
          path: _server_binaries

      - name: Download Linux arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: cpp-server-linux-arm64
          path: _server_binaries

      - name: Download macOS x64 binary
        uses: actions/download-artifact@v8
        with:
          name: cpp-server-macos-x64
          path: _server_binaries

      - name: Download Windows x64 binary
        uses: actions/download-artifact@v8
        with:
          name: cpp-server-windows-x64
          path: _server_binaries

      - name: Verify binaries
        run: ls -la _server_binaries/

      - name: Install dependencies
        run: yarn

      - name: Build and package universal server
        run: yarn workspace @omega-edit/server package
        env:
          CPP_SERVER_BINARIES_DIR: ${{ github.workspace }}/_server_binaries

      - name: Upload node server release tarball
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ env.UPLOAD_URL }}
          asset_path: ./packages/server/omega-edit-node-server-v${{ env.PKG_VERSION }}.tgz
          asset_name: omega-edit-node-server-v${{ env.PKG_VERSION }}.tgz
          asset_content_type: application/tar+gzip

      - name: Publish node server package to npm
        run: npm publish --access public ./packages/server/omega-edit-node-server-v${{ env.PKG_VERSION }}.tgz

  node-client-release:
    name: Node Client Release
    needs: [create-release]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Export git tag and package.json version
        run: ${{ env.export_cmd }}

      - name: Download upload_url
        uses: actions/download-artifact@v8
        with:
          name: upload_url

      - name: Add upload_url to GITHUB_ENV
        run: |
          UPLOAD_URL=$(cat upload_url)
          echo "UPLOAD_URL=$UPLOAD_URL" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: ${{ env.node_version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn

      - name: Build and package client
        run: yarn workspace @omega-edit/client package

      - name: Upload node client release tarball
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ env.UPLOAD_URL }}
          asset_path: ./packages/client/omega-edit-node-client-v${{ env.PKG_VERSION }}.tgz
          asset_name: omega-edit-node-client-v${{ env.PKG_VERSION }}.tgz
          asset_content_type: application/tar+gzip

      - name: Publish node client package to npm
        run: npm publish --access public ./packages/client/omega-edit-node-client-v${{ env.PKG_VERSION }}.tgz

  vscode-extension-release:
    name: VS Code Extension Release
    needs: [create-release]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Export git tag and package versions
        run: ${{ env.export_cmd }}

      - name: Download upload_url
        uses: actions/download-artifact@v8
        with:
          name: upload_url

      - name: Add upload_url to GITHUB_ENV
        run: |
          UPLOAD_URL=$(cat upload_url)
          echo "UPLOAD_URL=$UPLOAD_URL" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node_version }}
          cache: 'npm'
          cache-dependency-path: examples/vscode-extension/package-lock.json

      - name: Build local OmegaEdit middleware for the example
        uses: ./.github/workflows/build-middleware
        with:
          runner-os: Linux
          os-name: ubuntu-22.04
          skip-tests: 'true'

      - name: Build local client release tarball
        run: yarn workspace @omega-edit/client package

      - name: Stage and package VS Code extension
        shell: bash
        run: |
          STAGE_DIR="$(mktemp -d)"
          cp -R examples/vscode-extension/. "$STAGE_DIR"
          cd "$STAGE_DIR"
          npm pkg set "dependencies.@omega-edit/client=${PKG_VERSION}"
          npm install --no-save \
            "${GITHUB_WORKSPACE}/packages/server/omega-edit-node-server-v${PKG_VERSION}.tgz" \
            "${GITHUB_WORKSPACE}/packages/client/omega-edit-node-client-v${PKG_VERSION}.tgz"
          npm run package:vsix
          echo "VSIX_PATH=$STAGE_DIR/omega-edit-hex-editor.vsix" >> "$GITHUB_ENV"

      - name: Upload VS Code extension release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ env.UPLOAD_URL }}
          asset_path: ${{ env.VSIX_PATH }}
          asset_name: omega-edit-hex-editor-v${{ env.VSCODE_EXTENSION_VERSION }}.vsix
          asset_content_type: application/vsix

  node-ai-release:
    name: Node AI Tooling Release
    needs: [create-release]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Export git tag and package.json version
        run: ${{ env.export_cmd }}

      - name: Download upload_url
        uses: actions/download-artifact@v8
        with:
          name: upload_url

      - name: Add upload_url to GITHUB_ENV
        run: |
          UPLOAD_URL=$(cat upload_url)
          echo "UPLOAD_URL=$UPLOAD_URL" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: ${{ env.node_version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn

      - name: Build client
        run: yarn workspace @omega-edit/client prepare

      - name: Build and package AI tooling
        run: yarn workspace @omega-edit/ai package

      - name: Upload node AI tooling release tarball
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ env.UPLOAD_URL }}
          asset_path: ./packages/ai/omega-edit-node-ai-v${{ env.PKG_VERSION }}.tgz
          asset_name: omega-edit-node-ai-v${{ env.PKG_VERSION }}.tgz
          asset_content_type: application/tar+gzip

      - name: Publish node AI package to npm
        run: npm publish --access public ./packages/ai/omega-edit-node-ai-v${{ env.PKG_VERSION }}.tgz
