---
name: Rat Check

on:
  push:
    branches-ignore: [ 'dependabot/**' ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check:
    name: Rat Check
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out Repository
        uses: actions/checkout@v6

      - name: Verify repository files are accessible
        run: |
          test -f LICENSE.txt
          test -f NOTICE.txt
