---
name: Build C++ Middleware
description: Reusable action to build omega-edit C++ gRPC middleware server
inputs:
  runner-os:
    description: 'OS Name of Runner (macOS, Linux, Windows)'
    required: true
  os-name:
    description: 'OS Name (runs-on value)'
    required: true
  skip-tests:
    description: 'Skip running client tests (e.g., during release builds)'
    required: false
    default: 'false'
  platform:
    description: 'Target platform label (e.g., macos-x64, macos-arm64)'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: yarn
        cache-dependency-path: yarn.lock

    - name: Enable Developer Command Prompt
      if: inputs.runner-os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup cmake
      uses: lukka/get-cmake@latest

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install Conan
      shell: bash
      run: pip install conan

    - name: Detect Conan profile
      shell: bash
      run: conan profile detect --force

    - name: Configure Conan for Visual Studio 18
      if: inputs.runner-os == 'Windows' && startsWith(inputs.os-name, 'windows-2025')
      shell: bash
      run: echo "CONAN_MSBUILD_VS_CONF=-c tools.microsoft.msbuild:vs_version=18" >> "$GITHUB_ENV"

    - name: Resolve macOS target architecture
      if: inputs.runner-os == 'macOS'
      shell: bash
      run: |
        conan_arch=""
        macos_arch=""
        platform="${{ inputs.platform }}"
        os_name="${{ inputs.os-name }}"

        if [[ "$platform" == *"-x64" ]] || [[ "$os_name" == *"-x64" ]]; then
          conan_arch="x86_64"
          macos_arch="x86_64"
        elif [[ "$platform" == *"-arm64" ]] || [[ "$os_name" == *"-arm64" ]]; then
          conan_arch="armv8"
          macos_arch="arm64"
        elif [ "$RUNNER_ARCH" = "X64" ]; then
          conan_arch="x86_64"
          macos_arch="x86_64"
        elif [ "$RUNNER_ARCH" = "ARM64" ]; then
          conan_arch="armv8"
          macos_arch="arm64"
        fi

        if [ -z "$conan_arch" ] || [ -z "$macos_arch" ]; then
          echo "ERROR: Unable to resolve macOS target architecture for platform '${platform}' and os-name '${os_name}'" >&2
          exit 1
        fi

        echo "TARGET_CONAN_ARCH=$conan_arch" >> "$GITHUB_ENV"
        echo "TARGET_MACOS_ARCH=$macos_arch" >> "$GITHUB_ENV"

    - name: Cache Conan packages
      uses: actions/cache@v6
      with:
        path: ~/.conan2
        key: conan-v2-${{ inputs.runner-os }}-${{ runner.arch }}-${{ inputs.os-name }}-${{ inputs.platform }}-${{ hashFiles('server/cpp/conanfile.py', 'plugins/conanfile.py') }}
        restore-keys: |
          conan-v2-${{ inputs.runner-os }}-${{ runner.arch }}-${{ inputs.os-name }}-${{ inputs.platform }}-

    - name: Install transform plugin dependencies via Conan
      if: inputs.runner-os == 'Windows' || inputs.runner-os == 'macOS'
      shell: bash
      run: |
        conan_arch=()
        if [ "${{ inputs.runner-os }}" == "macOS" ]; then
          conan_arch=("-s:h" "arch=${TARGET_CONAN_ARCH}")
        fi
        for attempt in 1 2 3; do
          if conan install plugins --output-folder=_build_core/plugin-conan \
            --build=missing \
            -s build_type=Release \
            "${conan_arch[@]}" \
            ${CONAN_MSBUILD_VS_CONF:-} \
            -c tools.cmake.cmaketoolchain:generator=Ninja; then
            exit 0
          fi
          if [ "$attempt" -eq 3 ]; then
            echo "Conan install for transform plugin dependencies failed after $attempt attempts" >&2
            exit 1
          fi
          delay=$((attempt * 30))
          echo "Conan install for transform plugin dependencies failed on attempt $attempt; retrying in $delay seconds" >&2
          sleep "$delay"
        done

    - name: Install transform plugin system dependencies
      if: inputs.runner-os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev zlib1g-dev

    - name: Build omega_edit core library and transform plugins (static)
      shell: bash
      run: |
        cmake_args=()
        if [ "${{ inputs.runner-os }}" == "Windows" ] || [ "${{ inputs.runner-os }}" == "macOS" ]; then
          cmake_args+=("-DCMAKE_TOOLCHAIN_FILE=$(pwd)/_build_core/plugin-conan/conan_toolchain.cmake")
        fi
        if [ "${{ inputs.runner-os }}" == "macOS" ]; then
          cmake_args+=("-DCMAKE_OSX_ARCHITECTURES=${TARGET_MACOS_ARCH}")
        fi
        cmake -G Ninja -S . -B _build_core \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_DOCS=OFF \
          -DBUILD_EXAMPLES=ON \
          -DBUILD_TESTS=OFF \
          "${cmake_args[@]}"
        cmake --build _build_core --config Release
        cmake --install _build_core/packages/core --prefix "$(pwd)/_install_core" --config Release
        echo "OE_LIB_DIR=$(pwd)/_install_core/lib" >> $GITHUB_ENV
        echo "OE_PREFIX=$(pwd)/_install_core" >> $GITHUB_ENV
        echo "OMEGA_EDIT_TEST_PLUGIN_DIR=$(pwd)/_build_core/plugins/plugins" >> $GITHUB_ENV

    - name: Install server dependencies via Conan
      shell: bash
      run: |
        cd server/cpp
        conan_arch=()
        if [ "${{ inputs.runner-os }}" == "macOS" ]; then
          conan_arch=("-s:h" "arch=${TARGET_CONAN_ARCH}")
        fi
        for attempt in 1 2 3; do
          if conan install . --output-folder=build \
            --build=missing \
            -s build_type=Release \
            -s compiler.cppstd=17 \
            "${conan_arch[@]}" \
            ${CONAN_MSBUILD_VS_CONF:-} \
            -c tools.cmake.cmaketoolchain:generator=Ninja; then
            exit 0
          fi
          if [ "$attempt" -eq 3 ]; then
            echo "Conan install for server dependencies failed after $attempt attempts" >&2
            exit 1
          fi
          delay=$((attempt * 30))
          echo "Conan install for server dependencies failed on attempt $attempt; retrying in $delay seconds" >&2
          sleep "$delay"
        done

    - name: Install uuid-dev (Linux)
      if: inputs.runner-os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y uuid-dev

    - name: Build C++ gRPC Server
      shell: bash
      run: |
        cd server/cpp
        cmake_args=()
        if [ "${{ inputs.runner-os }}" == "macOS" ]; then
          cmake_args+=("-DCMAKE_OSX_ARCHITECTURES=${TARGET_MACOS_ARCH}")
        fi
        cmake --preset conan-release \
          -DOE_LIB_DIR="$OE_LIB_DIR" \
          -DCMAKE_PREFIX_PATH="$OE_PREFIX" \
          "${cmake_args[@]}" \
          || cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="build/conan_toolchain.cmake" \
            -DOE_LIB_DIR="$OE_LIB_DIR" \
            -DCMAKE_PREFIX_PATH="$OE_PREFIX" \
            "${cmake_args[@]}"
        cmake --build build --config Release
        cd ../..
        repo_root="$(pwd)"
        if [ "${{ inputs.runner-os }}" == "Windows" ]; then
          repo_root="$(pwd -W)"
        fi
        echo "CPP_SERVER_BINARY=${repo_root}/server/cpp/build/omega-edit-grpc-server$([ '${{ inputs.runner-os }}' == 'Windows' ] && echo '.exe' || echo '')" >> $GITHUB_ENV
        echo "CPP_TRANSFORM_PLUGIN_HOST_BINARY=${repo_root}/_build_core/core/omega-transform-plugin-host$([ '${{ inputs.runner-os }}' == 'Windows' ] && echo '.exe' || echo '')" >> $GITHUB_ENV

    - name: Yarn Install
      shell: bash
      run: |
        for attempt in 1 2 3; do
          if yarn --network-timeout 300000; then
            exit 0
          fi
          if [ "$attempt" -eq 3 ]; then
            exit 1
          fi
          echo "yarn install failed on attempt $attempt; retrying in 15 seconds" >&2
          sleep 15
        done

    - name: Yarn Package - Server
      shell: bash
      run: yarn workspace @omega-edit/server package
      env:
        CPP_SERVER_BINARY: ${{ env.CPP_SERVER_BINARY }}
        CPP_TRANSFORM_PLUGIN_HOST_BINARY: ${{ env.CPP_TRANSFORM_PLUGIN_HOST_BINARY }}

    - name: Yarn Prepare - Client
      shell: bash
      run: yarn workspace @omega-edit/client prepare

    - name: Yarn Package - AI
      shell: bash
      run: yarn workspace @omega-edit/ai package

    - name: Yarn Lint - AI
      if: inputs.skip-tests != 'true'
      shell: bash
      run: yarn workspace @omega-edit/ai lint

    - name: Yarn Test - Client
      if: inputs.skip-tests != 'true'
      shell: ${{ (inputs.runner-os == 'Windows') && 'pwsh' || 'bash' }}
      run: yarn workspace @omega-edit/client test
      env:
        CPP_SERVER_BINARY: ''

    - name: Yarn Test - Client (UDS)
      if: inputs.skip-tests != 'true' && inputs.runner-os != 'Windows'
      shell: ${{ (inputs.runner-os == 'Windows') && 'pwsh' || 'bash' }}
      run: yarn workspace @omega-edit/client test:uds
      env:
        CPP_SERVER_BINARY: ''

    - name: Yarn Test - AI
      if: inputs.skip-tests != 'true'
      shell: ${{ (inputs.runner-os == 'Windows') && 'pwsh' || 'bash' }}
      run: yarn workspace @omega-edit/ai test
      env:
        CPP_SERVER_BINARY: ''
