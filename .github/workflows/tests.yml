---
name: Unit Tests
on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  vscode-extension:
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-2025]
        vscode-version: ['1.110.0', stable]
      fail-fast: false
    name: VS Code extension checks on ${{ matrix.os }} with VS Code ${{ matrix.vscode-version }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/vscode-extension/package-lock.json

      - name: Build local OmegaEdit middleware for the example
        uses: ./.github/workflows/build-middleware
        with:
          runner-os: ${{ runner.os }}
          os-name: ${{ matrix.os }}
          skip-tests: 'true'

      - name: Install VS Code extension example dependencies
        run: npm ci
        working-directory: examples/vscode-extension

      - name: Run Biome, compile, and unit tests for the VS Code extension
        run: npm run lint && npm run compile && npm run test:unit
        working-directory: examples/vscode-extension
        env:
          CPP_SERVER_BINARY: ''
          VSCODE_VERSION: ${{ matrix.vscode-version }}

      - name: Run VS Code extension integration tests on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:integration
        working-directory: examples/vscode-extension
        env:
          CPP_SERVER_BINARY: ''
          VSCODE_VERSION: ${{ matrix.vscode-version }}

      - name: Run VS Code extension integration tests on Windows
        if: runner.os == 'Windows'
        run: npm run test:integration
        working-directory: examples/vscode-extension
        env:
          CPP_SERVER_BINARY: ''
          VSCODE_VERSION: ${{ matrix.vscode-version }}

  build-native:
    strategy:
      matrix:
        os: [windows-2022, windows-2025, ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
      fail-fast: false
    name: Native build and test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute artifact arch label
        shell: bash
        run: |
          echo "artifact_arch=$(echo $RUNNER_ARCH | awk '{print tolower($0)}')" >> $GITHUB_ENV

      - name: Build Native ${{ matrix.os }}
        uses: ./.github/workflows/build-native
        with:
          runner-os: ${{ runner.os }}
          os-name: ${{ matrix.os }}-${{ env.artifact_arch }}

  build-native-macos-x64:
    name: Native build macos-15 x64
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Native macos-15 x64
        uses: ./.github/workflows/build-native
        with:
          runner-os: ${{ runner.os }}
          os-name: macos-15-x64

  build-native-linux-arm64:
    name: Native build ubuntu-22.04 arm64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Native Linux arm64
        uses: ./.github/workflows/build-native-docker
        with:
          os-name: ubuntu-22.04-arm64
          docker-image: ghcr.io/ctc-oss/omega-edit-build-arm64:ubuntu-22.04
          library-filename: libomega_edit.so

  build-middleware:
    strategy:
      matrix:
        os: [windows-2022, windows-2025, ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    name: Build middleware ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute artifact arch label
        shell: bash
        run: |
          echo "artifact_arch=$(echo $RUNNER_ARCH | awk '{print tolower($0)}')" >> $GITHUB_ENV

      - name: Build Middleware ${{ matrix.os }}
        uses: ./.github/workflows/build-middleware
        with:
          runner-os: ${{ runner.os }}
          os-name: ${{ matrix.os }}-${{ env.artifact_arch }}

  coverage:
    name: Code Coverage
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup cmake
        uses: lukka/get-cmake@latest

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Build with coverage instrumentation
        run: |
          cmake --preset ci-coverage
          cmake --build --preset ci-coverage --config Debug

      - name: Run C/C++ tests
        run: ctest -C Debug --test-dir build-coverage/core --output-on-failure

      - name: Collect C/C++ coverage with lcov
        run: |
          lcov --capture --directory build-coverage --output-file coverage-native.info \
            --rc branch_coverage=1 --ignore-errors mismatch,gcov,source
          lcov --remove coverage-native.info \
            '*/src/tests/*' '*/src/examples/*' '*/_deps/*' '/usr/*' '*/catch2/*' \
            --output-file coverage-native.info --rc branch_coverage=1 --ignore-errors unused
          lcov --list coverage-native.info

      - name: Upload C/C++ coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage-native.info
          disable_search: true
          flags: native
          name: omega-edit-native
          use_oidc: true
          fail_ci_if_error: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Conan
        run: pip install conan

      - name: Install uuid-dev
        run: sudo apt-get install -y uuid-dev

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-coverage-${{ hashFiles('server/cpp/conanfile.py') }}
          restore-keys: |
            conan-coverage-

      - name: Build C++ gRPC server for client tests
        run: |
          cmake -G Ninja -S . -B _build_core \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_DOCS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_TESTS=OFF
          cmake --build _build_core --config Release
          cmake --install _build_core/packages/core --prefix "$(pwd)/_install_core" --config Release
          export OE_LIB_DIR="$(pwd)/_install_core/lib"
          export OE_PREFIX="$(pwd)/_install_core"
          cd server/cpp
          conan install . --output-folder=build \
            --build=missing \
            -s build_type=Release \
            -s compiler.cppstd=17 \
            -c tools.cmake.cmaketoolchain:generator=Ninja
          cmake --preset conan-release \
            -DOE_LIB_DIR="$OE_LIB_DIR" \
            -DCMAKE_PREFIX_PATH="$OE_PREFIX" \
            || cmake -G Ninja -S . -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_TOOLCHAIN_FILE="build/conan_toolchain.cmake" \
              -DOE_LIB_DIR="$OE_LIB_DIR" \
              -DCMAKE_PREFIX_PATH="$OE_PREFIX"
          cmake --build build --config Release
          cd ../..
          echo "CPP_SERVER_BINARY=$(pwd)/server/cpp/build/omega-edit-grpc-server" >> $GITHUB_ENV

      - name: Yarn Install
        run: yarn

      - name: Yarn Package - Server
        run: yarn workspace @omega-edit/server package
        env:
          CPP_SERVER_BINARY: ${{ env.CPP_SERVER_BINARY }}

      - name: Yarn Prepare - Client
        run: yarn workspace @omega-edit/client prepare

      - name: Yarn Package - AI
        run: yarn workspace @omega-edit/ai package

      - name: Yarn Lint - AI
        run: yarn workspace @omega-edit/ai lint

      - name: Run client tests with coverage
        run: yarn workspace @omega-edit/client test:coverage
        env:
          CPP_SERVER_BINARY: ''

      - name: Run AI tests
        run: yarn workspace @omega-edit/ai test
        env:
          CPP_SERVER_BINARY: ''

      - name: Upload TypeScript coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: packages/client/coverage/lcov.info
          disable_search: true
          flags: client
          name: omega-edit-client
          use_oidc: true
          fail_ci_if_error: true

  coverage-client-uds:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            label: linux
          - os: macos-15
            label: macos
      fail-fast: false
    name: Client UDS Coverage ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build middleware for UDS coverage
        uses: ./.github/workflows/build-middleware
        with:
          runner-os: ${{ runner.os }}
          os-name: ${{ matrix.os }}
          skip-tests: 'true'

      - name: Run client UDS coverage
        run: yarn workspace @omega-edit/client test:coverage:uds
        env:
          CPP_SERVER_BINARY: ''

      - name: Upload TypeScript UDS coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: packages/client/coverage/lcov.info
          disable_search: true
          flags: client-uds-${{ matrix.label }}
          name: omega-edit-client-uds-${{ matrix.label }}
          use_oidc: true
          fail_ci_if_error: true
