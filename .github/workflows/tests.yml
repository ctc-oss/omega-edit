---
name: Unit Tests
on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  vscode-extension:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2025]
        vscode-version: ['1.110.0', stable]
      fail-fast: false
    name: VS Code extension checks on ${{ matrix.os }} with VS Code ${{ matrix.vscode-version }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Build local OmegaEdit middleware for the example
        uses: ./.github/workflows/build-middleware
        with:
          runner-os: ${{ runner.os }}
          os-name: ${{ matrix.os }}
          skip-tests: 'true'

      - name: Install VS Code extension example dependencies
        run: npm ci
        working-directory: vscode-extension

      - name: Run Biome, compile, and unit tests for the VS Code extension
        run: npm run lint && npm run compile && npm run test:unit
        working-directory: vscode-extension
        env:
          CPP_SERVER_BINARY: ''
          VSCODE_VERSION: ${{ matrix.vscode-version }}

      - name: Run VS Code extension integration tests on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:integration
        working-directory: vscode-extension
        env:
          CPP_SERVER_BINARY: ''
          VSCODE_VERSION: ${{ matrix.vscode-version }}

      - name: Run VS Code extension integration tests on Windows
        if: runner.os == 'Windows'
        run: npm run test:integration
        working-directory: vscode-extension
        env:
          CPP_SERVER_BINARY: ''
          VSCODE_VERSION: ${{ matrix.vscode-version }}

      - name: Run VS Code extension integration tests on macOS
        if: runner.os == 'macOS'
        run: npm run test:integration
        working-directory: vscode-extension
        env:
          CPP_SERVER_BINARY: ''
          VSCODE_VERSION: ${{ matrix.vscode-version }}

  vscode-extension-server-binaries:
    name: Build VS Code extension server binary (${{ matrix.platform }})
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            runner-os: Linux
            platform: linux-x64
          - os: ubuntu-24.04-arm
            runner-os: Linux
            platform: linux-arm64
          - os: macos-15
            runner-os: macOS
            platform: macos-x64
          - os: macos-14
            runner-os: macOS
            platform: macos-arm64
          - os: windows-2022
            runner-os: Windows
            platform: windows-x64
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build C++ middleware for VSIX
        uses: ./.github/workflows/build-middleware
        with:
          runner-os: ${{ matrix.runner-os }}
          os-name: ${{ matrix.os }}
          platform: ${{ matrix.platform }}
          skip-tests: 'true'

      - name: Rename binary with platform suffix
        shell: bash
        run: |
          src="${{ env.CPP_SERVER_BINARY }}"
          host_src="${{ env.CPP_TRANSFORM_PLUGIN_HOST_BINARY }}"
          ext=""
          if [[ "${{ matrix.runner-os }}" == "Windows" ]]; then ext=".exe"; fi
          dest="server/cpp/build/omega-edit-grpc-server-${{ matrix.platform }}${ext}"
          host_dest="server/cpp/build/omega-transform-plugin-host-${{ matrix.platform }}${ext}"
          cp "$src" "$dest"
          cp "$host_src" "$host_dest"
          echo "PLATFORM_BINARY=$dest" >> "$GITHUB_ENV"
          echo "PLATFORM_PLUGIN_HOST_BINARY=$host_dest" >> "$GITHUB_ENV"

      - name: Upload platform server binary artifact (attempt 1)
        id: upload_server_binary_1
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: vscode-server-${{ matrix.platform }}
          path: |
            ${{ env.PLATFORM_BINARY }}
            ${{ env.PLATFORM_PLUGIN_HOST_BINARY }}
          overwrite: true
          retention-days: 14
          if-no-files-found: error

      - name: Upload platform server binary artifact (attempt 2)
        id: upload_server_binary_2
        if: ${{ steps.upload_server_binary_1.outcome == 'failure' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: vscode-server-${{ matrix.platform }}
          path: |
            ${{ env.PLATFORM_BINARY }}
            ${{ env.PLATFORM_PLUGIN_HOST_BINARY }}
          overwrite: true
          retention-days: 14
          if-no-files-found: error

      - name: Upload platform server binary artifact (attempt 3)
        id: upload_server_binary_3
        if: ${{ steps.upload_server_binary_1.outcome == 'failure' && steps.upload_server_binary_2.outcome == 'failure' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: vscode-server-${{ matrix.platform }}
          path: |
            ${{ env.PLATFORM_BINARY }}
            ${{ env.PLATFORM_PLUGIN_HOST_BINARY }}
          overwrite: true
          retention-days: 14
          if-no-files-found: error

      - name: Fail if platform server binary upload retries are exhausted
        if: ${{ steps.upload_server_binary_1.outcome == 'failure' && steps.upload_server_binary_2.outcome == 'failure' && steps.upload_server_binary_3.outcome == 'failure' }}
        shell: bash
        run: exit 1

      - name: Stage platform transform plugins
        shell: bash
        run: |
          patterns=("-name" "omega_transform_*.so")
          if [[ "${{ matrix.runner-os }}" == "Windows" ]]; then
            patterns=("-name" "omega_transform_*.dll")
          elif [[ "${{ matrix.runner-os }}" == "macOS" ]]; then
            patterns=("(" "-name" "omega_transform_*.so" "-o" "-name" "omega_transform_*.dylib" ")")
          fi
          src="_build_core/plugins/plugins"
          dest="_vscode_transform_plugins/${{ matrix.platform }}"
          mkdir -p "$dest"
          find "$src" -maxdepth 1 -type f "${patterns[@]}" -exec cp {} "$dest" \;
          test "$(find "$dest" -maxdepth 1 -type f | wc -l)" -gt 0
          echo "TRANSFORM_PLUGIN_ARTIFACT_DIR=$dest" >> "$GITHUB_ENV"

      - name: Upload platform transform plugin artifact (attempt 1)
        id: upload_transform_plugins_1
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: vscode-transforms-${{ matrix.platform }}
          path: ${{ env.TRANSFORM_PLUGIN_ARTIFACT_DIR }}/*
          overwrite: true
          retention-days: 14
          if-no-files-found: error

      - name: Upload platform transform plugin artifact (attempt 2)
        id: upload_transform_plugins_2
        if: ${{ steps.upload_transform_plugins_1.outcome == 'failure' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: vscode-transforms-${{ matrix.platform }}
          path: ${{ env.TRANSFORM_PLUGIN_ARTIFACT_DIR }}/*
          overwrite: true
          retention-days: 14
          if-no-files-found: error

      - name: Upload platform transform plugin artifact (attempt 3)
        id: upload_transform_plugins_3
        if: ${{ steps.upload_transform_plugins_1.outcome == 'failure' && steps.upload_transform_plugins_2.outcome == 'failure' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: vscode-transforms-${{ matrix.platform }}
          path: ${{ env.TRANSFORM_PLUGIN_ARTIFACT_DIR }}/*
          overwrite: true
          retention-days: 14
          if-no-files-found: error

      - name: Fail if transform plugin artifact upload retries are exhausted
        if: ${{ steps.upload_transform_plugins_1.outcome == 'failure' && steps.upload_transform_plugins_2.outcome == 'failure' && steps.upload_transform_plugins_3.outcome == 'failure' }}
        shell: bash
        run: exit 1

  vscode-extension-package:
    name: Package VS Code extension VSIX
    needs: [vscode-extension-server-binaries]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: yarn

      - name: Install workspace dependencies
        run: yarn

      - name: Create server binaries directory
        run: mkdir -p _server_binaries

      - name: Download Linux x64 server binary
        uses: actions/download-artifact@v8
        with:
          name: vscode-server-linux-x64
          path: _server_binaries

      - name: Download Linux arm64 server binary
        uses: actions/download-artifact@v8
        with:
          name: vscode-server-linux-arm64
          path: _server_binaries

      - name: Download macOS x64 server binary
        uses: actions/download-artifact@v8
        with:
          name: vscode-server-macos-x64
          path: _server_binaries

      - name: Download macOS arm64 server binary
        uses: actions/download-artifact@v8
        with:
          name: vscode-server-macos-arm64
          path: _server_binaries

      - name: Download Windows x64 server binary
        uses: actions/download-artifact@v8
        with:
          name: vscode-server-windows-x64
          path: _server_binaries

      - name: Download Linux x64 transform plugins
        uses: actions/download-artifact@v8
        with:
          name: vscode-transforms-linux-x64
          path: _transform_plugins/linux-x64

      - name: Download Linux arm64 transform plugins
        uses: actions/download-artifact@v8
        with:
          name: vscode-transforms-linux-arm64
          path: _transform_plugins/linux-arm64

      - name: Download macOS x64 transform plugins
        uses: actions/download-artifact@v8
        with:
          name: vscode-transforms-macos-x64
          path: _transform_plugins/macos-x64

      - name: Download macOS arm64 transform plugins
        uses: actions/download-artifact@v8
        with:
          name: vscode-transforms-macos-arm64
          path: _transform_plugins/macos-arm64

      - name: Download Windows x64 transform plugins
        uses: actions/download-artifact@v8
        with:
          name: vscode-transforms-windows-x64
          path: _transform_plugins/windows-x64

      - name: Verify supported server binaries
        shell: bash
        run: |
          expected=(
            omega-edit-grpc-server-linux-x64
            omega-edit-grpc-server-linux-arm64
            omega-edit-grpc-server-macos-x64
            omega-edit-grpc-server-macos-arm64
            omega-edit-grpc-server-windows-x64.exe
            omega-transform-plugin-host-linux-x64
            omega-transform-plugin-host-linux-arm64
            omega-transform-plugin-host-macos-x64
            omega-transform-plugin-host-macos-arm64
            omega-transform-plugin-host-windows-x64.exe
          )
          for binary in "${expected[@]}"; do
            test -f "_server_binaries/$binary"
          done

      - name: Build universal server release tarball
        run: yarn workspace @omega-edit/server package
        env:
          CPP_SERVER_BINARIES_DIR: ${{ github.workspace }}/_server_binaries
          OMEGA_EDIT_TRANSFORM_PLUGINS_DIR: ${{ github.workspace }}/_transform_plugins

      - name: Build local client release tarball
        run: yarn workspace @omega-edit/client package

      - name: Stage and package VS Code extension
        shell: bash
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          STAGE_DIR="$(mktemp -d)"
          cp -R vscode-extension/. "$STAGE_DIR"
          cd "$STAGE_DIR"
          npm pkg set "devDependencies.@omega-edit/client=${PKG_VERSION}"
          npm install --no-save \
            "${GITHUB_WORKSPACE}/packages/server/omega-edit-node-server-v${PKG_VERSION}.tgz" \
            "${GITHUB_WORKSPACE}/packages/client/omega-edit-node-client-v${PKG_VERSION}.tgz"
          npm run package:vsix
          mkdir -p "${GITHUB_WORKSPACE}/_vsix"
          cp omega-edit-data-editor.vsix "${GITHUB_WORKSPACE}/_vsix/omega-edit-data-editor-v${PKG_VERSION}.vsix"

      - name: Upload VS Code extension VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: omega-edit-data-editor-vsix
          path: _vsix/*.vsix
          retention-days: 14
          if-no-files-found: error

  build-native:
    strategy:
      matrix:
        os: [windows-2022, windows-2025, ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
      fail-fast: false
    name: Native build and test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compute artifact arch label
        shell: bash
        run: |
          echo "artifact_arch=$(echo $RUNNER_ARCH | awk '{print tolower($0)}')" >> $GITHUB_ENV

      - name: Build Native ${{ matrix.os }}
        uses: ./.github/workflows/build-native
        with:
          runner-os: ${{ runner.os }}
          os-name: ${{ matrix.os }}-${{ env.artifact_arch }}

  build-native-macos-x64:
    name: Native build macos-15 x64
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Native macos-15 x64
        uses: ./.github/workflows/build-native
        with:
          runner-os: ${{ runner.os }}
          os-name: macos-15-x64

  build-native-linux-arm64:
    name: Native build ubuntu-22.04 arm64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Native Linux arm64
        uses: ./.github/workflows/build-native-docker
        with:
          os-name: ubuntu-22.04-arm64
          docker-image: ghcr.io/ctc-oss/omega-edit-build-arm64:ubuntu-22.04
          library-filename: libomega_edit.so

  build-middleware:
    strategy:
      matrix:
        os: [windows-2022, windows-2025, ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    name: Build middleware ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compute artifact arch label
        shell: bash
        run: |
          echo "artifact_arch=$(echo $RUNNER_ARCH | awk '{print tolower($0)}')" >> $GITHUB_ENV

      - name: Build Middleware ${{ matrix.os }}
        uses: ./.github/workflows/build-middleware
        with:
          runner-os: ${{ runner.os }}
          os-name: ${{ matrix.os }}-${{ env.artifact_arch }}

  coverage:
    name: Code Coverage
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup cmake
        uses: lukka/get-cmake@latest

      - name: Install lcov and transform plugin dependencies
        run: sudo apt-get update && sudo apt-get install -y lcov libssl-dev zlib1g-dev

      - name: Build with coverage instrumentation
        run: |
          cmake --preset ci-coverage
          cmake --build --preset ci-coverage --config Debug

      - name: Run C/C++ tests
        run: |
          ctest -C Debug --test-dir build-coverage/core --output-on-failure
          ctest -C Debug --test-dir build-coverage/plugins --output-on-failure

      - name: Collect C/C++ coverage with lcov
        run: |
          lcov --capture --directory build-coverage --output-file coverage-native.info \
            --rc branch_coverage=1 --ignore-errors mismatch,gcov,source
          lcov --remove coverage-native.info \
            '*/src/tests/*' '*/src/examples/*' '*/plugins/tests/*' '*/_deps/*' '/usr/*' '*/catch2/*' \
            --output-file coverage-native.info --rc branch_coverage=1 --ignore-errors unused
          lcov --list coverage-native.info

      - name: Upload C/C++ coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage-native.info
          disable_search: true
          flags: native
          name: omega-edit-native
          use_oidc: true
          fail_ci_if_error: true

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install Conan
        run: pip install conan

      - name: Install uuid-dev
        run: sudo apt-get install -y uuid-dev

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v6
        with:
          path: ~/.conan2
          key: conan-coverage-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('server/cpp/conanfile.py') }}
          restore-keys: |
            conan-coverage-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Build C++ gRPC server for client tests
        run: |
          cmake -G Ninja -S . -B _build_core \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_DOCS=OFF \
            -DBUILD_EXAMPLES=ON \
            -DBUILD_TESTS=OFF
          cmake --build _build_core --config Release
          cmake --install _build_core/packages/core --prefix "$(pwd)/_install_core" --config Release
          echo "OMEGA_EDIT_TEST_PLUGIN_DIR=$(pwd)/_build_core/plugins/plugins" >> $GITHUB_ENV
          export OE_LIB_DIR="$(pwd)/_install_core/lib"
          export OE_PREFIX="$(pwd)/_install_core"
          cd server/cpp
          conan install . --output-folder=build \
            --build=missing \
            -s build_type=Release \
            -s compiler.cppstd=17 \
            -c tools.cmake.cmaketoolchain:generator=Ninja
          cmake --preset conan-release \
            -DOE_LIB_DIR="$OE_LIB_DIR" \
            -DCMAKE_PREFIX_PATH="$OE_PREFIX" \
            || cmake -G Ninja -S . -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_TOOLCHAIN_FILE="build/conan_toolchain.cmake" \
              -DOE_LIB_DIR="$OE_LIB_DIR" \
              -DCMAKE_PREFIX_PATH="$OE_PREFIX"
          cmake --build build --config Release
          cd ../..
          echo "CPP_SERVER_BINARY=$(pwd)/server/cpp/build/omega-edit-grpc-server" >> $GITHUB_ENV

      - name: Yarn Install
        run: |
          for attempt in 1 2 3; do
            if yarn --network-timeout 300000; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "yarn install failed on attempt $attempt; retrying in 15 seconds" >&2
            sleep 15
          done

      - name: Yarn Package - Server
        run: yarn workspace @omega-edit/server package
        env:
          CPP_SERVER_BINARY: ${{ env.CPP_SERVER_BINARY }}

      - name: Yarn Prepare - Client
        run: yarn workspace @omega-edit/client prepare

      - name: Yarn Package - AI
        run: yarn workspace @omega-edit/ai package

      - name: Yarn Lint - AI
        run: yarn workspace @omega-edit/ai lint

      - name: Run client tests with coverage
        run: yarn workspace @omega-edit/client test:coverage
        env:
          CPP_SERVER_BINARY: ''

      - name: Run AI tests
        run: yarn workspace @omega-edit/ai test
        env:
          CPP_SERVER_BINARY: ''

      - name: Upload TypeScript coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: packages/client/coverage/lcov.info
          disable_search: true
          flags: client
          name: omega-edit-client
          use_oidc: true
          fail_ci_if_error: true

  test-client-uds:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            label: linux
          - os: macos-15
            label: macos
      fail-fast: false
    name: Client UDS Tests ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build middleware for UDS tests
        uses: ./.github/workflows/build-middleware
        with:
          runner-os: ${{ runner.os }}
          os-name: ${{ matrix.os }}
          skip-tests: 'true'

      - name: Run client UDS tests
        run: yarn workspace @omega-edit/client test:uds
        env:
          CPP_SERVER_BINARY: ''
