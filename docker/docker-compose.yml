# Ωedit™ gRPC Server — Docker Compose for local development
#
# Usage:
#   docker compose up          # start the server
#   docker compose up -d       # start in background
#   docker compose logs -f     # follow logs
#   docker compose down        # stop and remove
#
# Connect from the host:
#   grpcurl -plaintext localhost:9000 list
#   # or from TypeScript:
#   import { getClient } from '@omega-edit/client'
#   const client = await getClient(9000)

services:
  omega-edit-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    image: ghcr.io/ctc-oss/omega-edit-server:latest
    ports:
      - '9000:9000'
    environment:
      - OMEGA_EDIT_SERVER_HOST=0.0.0.0
      - OMEGA_EDIT_SERVER_PORT=9000
    volumes:
      # Mount a host directory for file editing (optional)
      - omega-edit-data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'nc', '-z', '127.0.0.1', '9000']
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  omega-edit-data:
